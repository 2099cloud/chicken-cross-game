<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小雞過馬路 - 手機橫向版</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #87CEEB; /* 天空藍背景 */
            font-family: '微軟正黑體', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            touch-action: none; /* 防止手機瀏覽器預設的滑動行為 */
            overflow: hidden;
        }
        /* 遊戲畫布自適應設定 */
        canvas {
            background-color: #7CFC00; /* 草地綠背景 */
            box-shadow: 0px 5px 15px rgba(0,0,0,0.5);
            border: 4px solid #fff;
            border-radius: 10px;
            width: 100%;
            max-width: 800px; /* 最大寬度限制 */
            max-height: 60vh; /* 預留空間給下方的按鈕 */
            object-fit: contain;
        }
        /* 手機版控制按鍵區塊 */
        #mobile-controls {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            user-select: none; /* 防止長按選取文字 */
        }
        .btn-row {
            display: flex;
            gap: 15px;
        }
        .control-btn {
            width: 60px;
            height: 60px;
            font-size: 28px;
            border-radius: 15px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 3px solid #333;
            box-shadow: 0px 4px 0px #333;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }
        .control-btn:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px #333;
            background-color: #e0e0e0;
        }
        /* 在電腦大螢幕上可以隱藏按鈕，或者保留方便滑鼠點擊 */
        @media (min-height: 800px) {
            canvas { max-height: 500px; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="mobile-controls">
        <div class="btn-row">
            <button class="control-btn" id="btn-up">⬆️</button>
        </div>
        <div class="btn-row">
            <button class="control-btn" id="btn-left">⬅️</button>
            <button class="control-btn" id="btn-down">⬇️</button>
            <button class="control-btn" id="btn-right">➡️</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 遊戲狀態與參數
        let score = 0;
        let lives = 3;
        let isGameOver = false;

        // 定義小雞 (玩家)，因應畫布變寬，起點置中
        const player = {
            x: 390, 
            y: 360,
            width: 20,
            height: 20,
            color: "#FFD700", 
            speed: 20 
        };

        // 定義馬路上的車輛 (加寬畫布，增加車輛分散度)
        const carWidth = 40;
        const carHeight = 20;
        const lanes = [
            { y: 300, speed: 2.5, dir: 1, color: '#FF4500', cars: [{x: 0}, {x: 300}, {x: 600}] },
            { y: 240, speed: 3.5, dir: -1, color: '#1E90FF', cars: [{x: 100}, {x: 400}, {x: 700}] },
            { y: 180, speed: 2.0, dir: 1, color: '#8A2BE2', cars: [{x: 50}, {x: 250}, {x: 500}] },
            { y: 120, speed: 4.5, dir: -1, color: '#FF1493', cars: [{x: 200}, {x: 550}] }
        ];

        // --- 移動邏輯 ---
        function moveUp() { if (!isGameOver && player.y > 0) player.y -= player.speed; }
        function moveDown() { if (!isGameOver && player.y < canvas.height - player.height) player.y += player.speed; }
        function moveLeft() { if (!isGameOver && player.x > 0) player.x -= player.speed; }
        function moveRight() { if (!isGameOver && player.x < canvas.width - player.width) player.x += player.speed; }

        // --- 電腦鍵盤控制 ---
        document.addEventListener("keydown", (e) => {
            if (isGameOver && e.key === "Enter") return resetGame();
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) e.preventDefault();
            
            if (e.key === "ArrowUp") moveUp();
            if (e.key === "ArrowDown") moveDown();
            if (e.key === "ArrowLeft") moveLeft();
            if (e.key === "ArrowRight") moveRight();
        });

        // --- 手機虛擬按鈕控制 (使用 pointerdown 支援滑鼠與觸控) ---
        document.getElementById("btn-up").addEventListener("pointerdown", moveUp);
        document.getElementById("btn-down").addEventListener("pointerdown", moveDown);
        document.getElementById("btn-left").addEventListener("pointerdown", moveLeft);
        document.getElementById("btn-right").addEventListener("pointerdown", moveRight);

        // --- 點擊遊戲畫面重新開始 ---
        canvas.addEventListener("pointerdown", () => {
            if (isGameOver) resetGame();
        });

        // 重置玩家位置
        function resetPlayer() {
            player.x = 390;
            player.y = 360;
        }

        // 重新開始遊戲
        function resetGame() {
            score = 0;
            lives = 3;
            isGameOver = false;
            // 重置車速
            lanes[0].speed = 2.5; lanes[1].speed = 3.5;
            lanes[2].speed = 2.0; lanes[3].speed = 4.5;
            resetPlayer();
        }

        // 遊戲邏輯更新
        function update() {
            if (isGameOver) return;

            // 移動車輛與碰撞偵測
            lanes.forEach(lane => {
                lane.cars.forEach(car => {
                    car.x += lane.speed * lane.dir;
                    
                    if (lane.dir === 1 && car.x > canvas.width) car.x = -carWidth;
                    if (lane.dir === -1 && car.x < -carWidth) car.x = canvas.width;

                    if (player.x < car.x + carWidth &&
                        player.x + player.width > car.x &&
                        player.y < lane.y + carHeight &&
                        player.y + player.height > lane.y) {
                        
                        lives--;
                        resetPlayer();
                        if (lives <= 0) isGameOver = true;
                    }
                });
            });

            // 抵達終點
            if (player.y < 80) {
                score += 10;
                resetPlayer();
                lanes.forEach(lane => lane.speed += 0.3); // 難度提升
            }
        }

        // 繪製遊戲畫面
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 畫馬路
            ctx.fillStyle = "#555";
            ctx.fillRect(0, 100, canvas.width, 240);

            // 畫馬路上的分隔線
            ctx.fillStyle = "white";
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.fillRect(i, 160, 20, 2);
                ctx.fillRect(i, 220, 20, 2);
                ctx.fillRect(i, 280, 20, 2);
            }

            // 畫車輛
            lanes.forEach(lane => {
                ctx.fillStyle = lane.color;
                lane.cars.forEach(car => {
                    ctx.fillRect(car.x, lane.y, carWidth, carHeight);
                    ctx.fillStyle = "rgba(255,255,255,0.6)";
                    ctx.fillRect(car.x + (lane.dir === 1 ? 25 : 5), lane.y + 2, 10, 16);
                    ctx.fillStyle = lane.color; 
                });
            });

            // 畫小雞
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = "red";
            ctx.fillRect(player.x + 5, player.y - 4, 10, 4);

            // 畫介面
            ctx.fillStyle = "black";
            ctx.font = "24px '微軟正黑體', sans-serif";
            ctx.fillText("⭐ 分數: " + score, 20, 40);
            
            let hearts = "";
            for(let i=0; i<lives; i++) hearts += "❤️";
            ctx.fillText("生命: " + hearts, canvas.width - 180, 40);

            // 遊戲結束畫面
            if (isGameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 48px '微軟正黑體', sans-serif";
                ctx.textAlign = "center"; // 文字置中對齊
                ctx.fillText("遊戲結束！", canvas.width / 2, 180);
                ctx.font = "24px '微軟正黑體', sans-serif";
                ctx.fillText("最終分數: " + score, canvas.width / 2, 240);
                // 提示改為點擊畫面
                ctx.fillText("點擊遊戲畫面重新開始", canvas.width / 2, 300);
                ctx.textAlign = "left"; // 恢復預設對齊方式
            }
        }

        // 遊戲主迴圈
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 啟動遊戲
        gameLoop();
    </script>
</body>
</html>
